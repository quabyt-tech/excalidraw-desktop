name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches tauri.conf.json version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "v$VERSION" != "${{ github.ref_name }}" ]; then
            echo "::error::Tag ${{ github.ref_name }} does not match tauri.conf.json version $VERSION — bump the version before tagging"
            exit 1
          fi

      # Create the draft release once so the matrix jobs all upload to the
      # same release instead of racing to create duplicate drafts.
      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ID=$(gh api "repos/${{ github.repository }}/releases" \
            -f tag_name="${{ github.ref_name }}" \
            -f name="Excalidraw Desktop ${{ github.ref_name }}" \
            -f body="See the assets below to download and install." \
            -F draft=true \
            --jq .id)
          echo "id=$ID" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

  publish:
    needs: [create-release, build] # only runs if every platform built successfully
    runs-on: ubuntu-latest
    steps:
      - name: Add generated notes and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ github.ref_name }}" --jq .body)
          # Publish by release id, not tag: a re-tagged run can leave multiple
          # drafts on the same tag and tag lookup picks an arbitrary one.
          gh api "repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }}" \
            -X PATCH -f body="$NOTES" -F draft=false
